server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API calls stay same-origin from the browser's point of view — nginx
    # forwards them to the backend container over the Docker Compose network.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — client-side routing handles the path, nginx just always
    # serves index.html for anything that isn't a real static file.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
